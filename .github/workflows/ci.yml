name: CI - ECOTRACK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ───────────────────────────────────────────
  test-backend:
    name: 🧪 Tests Backend (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les dépendances
        run: npm install

      - name: 🧪 Lancer les tests
        run: node --experimental-vm-modules node_modules/.bin/jest --forceExit --passWithNoTests
        env:
          NODE_ENV: test
          SECRET_KEY: test_secret_key_ci

  # ───────────────────────────────────────────
  test-frontend:
    name: 🎨 Tests Frontend (React Testing Library)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les dépendances
        run: npm install

      - name: 🧪 Lancer les tests
        run: npm test -- --watchAll=false
        env:
          CI: true

      - name: 🏗️ Vérifier le build
        run: npm run build
        env:
          CI: false

  # ───────────────────────────────────────────
  status:
    name: ✅ CI Terminé
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always()
    steps:
      - name: 📋 Résumé
        run: |
          echo "================================"
          echo "  ECOTRACK CI - Résumé"
          echo "================================"
          echo "Backend  : ${{ needs.test-backend.result }}"
          echo "Frontend : ${{ needs.test-frontend.result }}"
          echo "================================"