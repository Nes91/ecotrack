name: CI - ECOTRACK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ───────────────────────────────────────────
  test-backend:
    name: 🧪 Tests Backend (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Installer les dépendances
        run: npm ci

      - name: 🧪 Lancer les tests
        run: npm test
        env:
          NODE_ENV: test
          SECRET_KEY: test_secret_key_ci

      - name: 📊 Uploader le rapport coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # ───────────────────────────────────────────
  test-frontend:
    name: 🎨 Tests Frontend (React Testing Library)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Installer les dépendances
        run: npm ci

      - name: 🧪 Lancer les tests
        run: npm test -- --watchAll=false --coverage
        env:
          CI: true

      - name: 🏗️ Vérifier le build
        run: npm run build
        env:
          CI: false

      - name: 📊 Uploader le rapport coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ───────────────────────────────────────────
  status:
    name: ✅ CI Terminé
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always()
    steps:
      - name: 📋 Résumé
        run: |
          echo "================================"
          echo "  ECOTRACK CI - Résumé"
          echo "================================"
          echo "Backend  : ${{ needs.test-backend.result }}"
          echo "Frontend : ${{ needs.test-frontend.result }}"
          echo "================================"